id: allende
version: 1
name_es: "Salvador Allende"
name_en: "Salvador Allende"
country_origin: "Chile"
years_active: "1970-1973"

bio_short_es: |
  Médico socialista, presidente de Chile 1970-73, primer marxista elegido democráticamente en el mundo.
  Murió en La Moneda durante el golpe del 11 de septiembre.

bio_short_en: |
  Socialist physician, president of Chile 1970-73, first democratically elected Marxist in the world.
  Died in La Moneda during the September 11 coup.

bio_long_es: |
  Senador socialista cuatro veces candidato presidencial. Ganó en 1970 por la mínima con 36.6%
  ante una derecha dividida (Alessandri y Tomic). Confirmado por el Congreso tras negociar el
  Estatuto de Garantías Democráticas.

  Su programa, la Unidad Popular, propuso la "vía chilena al socialismo": dentro de la legalidad
  constitucional. Nacionalizó el cobre (con apoyo unánime del Congreso, raro), aceleró reforma
  agraria, controles de precios, asistencia médica universal.

  Pero la inflación se disparó (sabotaje empresarial + emisión + presión cambiaria), la oposición
  paralizó el Congreso, EEUU activó programas encubiertos (Track II, ITT), Patria y Libertad atentó,
  los camioneros pararon. Pinochet, ascendido en agosto 73, lideró el golpe del 11 de septiembre.

  Allende se atrincheró en La Moneda. Su último discurso por Radio Magallanes ("¡Tienen la fuerza,
  podrán avasallarnos, pero no se detienen los procesos sociales!") quedó como mito.

