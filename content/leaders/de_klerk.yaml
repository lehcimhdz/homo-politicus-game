id: de_klerk
version: 1
name_es: "F.W. de Klerk"
name_en: "F.W. de Klerk"
country_origin: "South Africa"
years_active: "1989-1994"

bio_short_es: |
  Último presidente del régimen del apartheid. Liberó a Mandela, legalizó el ANC, lideró las
  negociaciones que terminaron pacíficamente con el sistema. Premio Nobel compartido (1993).

bio_short_en: |
  Last apartheid president. Freed Mandela, legalized the ANC, led negotiations that peacefully
  ended the system. Shared Nobel Prize (1993).

bio_long_es: |
  Abogado afrikáner conservador, ministro de Educación bajo Botha. Asumió presidencia en 1989
  ante un país aislado internacionalmente, economía estancada, guerra civil de baja intensidad,
  y URSS en colapso (lo que quitó el argumento "anti-comunismo" del régimen).

  Su discurso al parlamento 2/2/1990 anunció: legalización del ANC y PAC, liberación de Mandela
  (11 días después), levantamiento del estado de emergencia. Inició el proceso de negociación
  CODESA (1991-93) que produjo la constitución interina y elecciones democráticas 1994.

  Vicepresidente bajo Mandela (1994-96). Premio Nobel compartido con Mandela (1993). Su rol es
  polémico: para algunos es un héroe pragmático; para otros, un cómplice del apartheid que negoció
  cuando ya no había alternativa. La verdad probablemente está en el medio.

