trivia_es: |
  - Sobrevivió al atentado del IRA en Brighton (1984).
  - Acuñó "There is no alternative" (TINA).
  - Su hijo Mark fue acusado de mercenarismo en Guinea Ecuatorial.
  - Murió en 2013; partes del país literalmente celebraron en las calles.
