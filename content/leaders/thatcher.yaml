id: thatcher
version: 1
name_es: "Margaret Thatcher"
name_en: "Margaret Thatcher"
country_origin: "United Kingdom"
years_active: "1979-1990"

bio_short_es: |
  Primera ministra británica, líder del neoliberalismo anglosajón. Privatizó industrias estatales,
  derrotó a los sindicatos del carbón y combatió a la URSS junto a Reagan. Polarizadora extrema.

bio_short_en: |
  British PM, leader of Anglo neoliberalism. Privatized state industries, defeated coal unions,
  fought USSR alongside Reagan. Extreme polarizer.

bio_long_es: |
  Hija de un tendero de Grantham. Química de formación, abogada de carrera, política por convicción.
  Asumió la jefatura del Partido Conservador en 1975, ganó la elección general de 1979 con un
  programa explícito de ruptura con el consenso socialdemócrata de posguerra.

  Sus tres ejes: control monetario contra la inflación (Friedman), privatización masiva (British Telecom,
  British Gas, BR, water boards), y reducción del poder sindical. La huelga minera de 1984-85 (NUM vs
  Thatcher) fue su Stalingrado. Ganó.

  En política exterior, fue belicista (Guerra de las Malvinas en 1982 le rescató la presidencia),
  euroescéptica avant la lettre, y partner intelectual de Reagan en la cruzada anticomunista.
  Cayó por la poll tax (impuesto regresivo) en 1990, derribada por su propio partido.

personality_traits:
  - "neoliberal"
  - "anti-union"
  - "iron_lady"
  - "monetarist"
  - "atlanticist"

