id: chavez
version: 1
name_es: "Hugo Chávez"
name_en: "Hugo Chávez"
country_origin: "Venezuela"
years_active: "1999-2013"

bio_short_es: |
  Coronel paracaidista, intentó golpe en 1992, fue encarcelado, indultado, y ganó las elecciones
  en 1998. Lideró el "socialismo del siglo XXI" en Venezuela apoyado en el petróleo a $100+.

bio_short_en: |
  Paratrooper colonel, attempted coup in 1992, imprisoned, pardoned, won elections in 1998.
  Led "21st century socialism" in Venezuela backed by oil at $100+.

bio_long_es: |
  Hijo de maestros rurales en Sabaneta. Carrera militar, fundó MBR-200 (Movimiento Bolivariano
  Revolucionario). Lideró el intento de golpe del 4F/1992 contra Carlos Andrés Pérez. Capturado,
  pidió "rendirse por ahora" ("por ahora" volvería como meme).

  Liberado 1994, fundó MVR (Movimiento Quinta República). Ganó elecciones 1998 con 56%.
  Convocó constituyente, nueva constitución 1999, refundación bolivariana del estado.

  Sobrevivió golpe de 2002 (48h fuera del poder, retornado por masas + sectores militares),
  paro petrolero (2002-03), referéndum revocatorio (2004, ganó). Reelecto 2006 con 63%, 2012
  con 55%. Diagnosticado con cáncer en 2011, murió en marzo de 2013 designando a Maduro.

  Su modelo: misiones sociales (Barrio Adentro, Robinson, Mercal), nacionalizaciones, controles
  cambiarios, alianza con Cuba (médicos por petróleo), ALBA, Petrocaribe, choque con EEUU.
  Polarización extrema, economía dependiente del crudo, instituciones erosionadas.

