trivia_es: |
  - Murió de cáncer relativamente joven (58 años).
  - En 4F/1992 dijo "por ahora" que se volvió leyenda.
  - Pedro Carmona, presidente golpista 2002, duró 48 horas.
  - Cantó por TV temas vallenatos.
  - Su sucesor designado fue Nicolás Maduro (su ex chofer y luego canciller).
