  regime_legitimacy: +0.20
  economic_ideology: -0.40       # Socialista
  social_ideology: -0.20
  authoritarianism_prob: +0.30
  press_freedom: -0.30
  international_pressure: +0.30  # EEUU vendrá
  us_alignment: -0.50
  china_alignment: +0.10
  soft_power_index: +0.20        # Internacionalismo
  diplomatic_prestige: +0.10
  invasion_prob: +0.20

unique_actions:
  - id: "campana_alfabetizacion"
    name_es: "Campaña de alfabetización"
    effect: "literacy_rate +0.30 in 1 turn, popularity +0.15, soft_power +0.10"
  - id: "internacionalismo_medico"
    name_es: "Médicos cubanos al exterior"
    effect: "soft_power +0.15, tax_collection +5%, brain_drain +0.05"
  - id: "nacionalizacion_total"
    name_es: "Nacionalización total"
    effect: "us_alignment -0.30, gdp short shock, equality +"
  - id: "discurso_8_horas"
    name_es: "Discurso de 8 horas (récord)"
    effect: "popularity +0.05, but next turn no other action"

nemesis_traits:
