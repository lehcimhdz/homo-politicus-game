    effect: "trade restricted, technology lag accumulates"
  - description_es: "Tu dependencia de URSS te hace vulnerable a su colapso"
    effect: "if USSR falls, your economy enters Special Period"
  - description_es: "Tu carisma no se transfiere a tu sucesor"
    effect: "after you, popularity baseline drops 20%"

historical_starting_year: 1959

trivia_es: |
  - Récord Guinness: discurso de 7h10' en la ONU (1960).
  - Hijo: Fidel Castro Díaz-Balart, físico nuclear, suicidio 2018.
  - Hermano de Raúl, sucesor.
  - Su biblioteca personal: 7000+ libros.
  - Estimación CIA: 638 intentos de asesinato (cigarros, conchas marinas explosivas, etc.).
