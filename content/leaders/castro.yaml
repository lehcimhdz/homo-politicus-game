id: castro
version: 1
name_es: "Fidel Castro"
name_en: "Fidel Castro"
country_origin: "Cuba"
years_active: "1959-2008"

bio_short_es: |
  Líder de la Revolución Cubana. Comandante en jefe 49 años. Sobrevivió a 11 presidentes
  estadounidenses, 638 intentos de asesinato confirmados, y el colapso de la URSS.

bio_short_en: |
  Leader of the Cuban Revolution. Commander-in-chief for 49 years. Survived 11 US presidents,
  638 confirmed assassination attempts, and the USSR collapse.

bio_long_es: |
  Abogado, hijo de hacendado, fundador del Movimiento 26 de Julio. Asaltó el cuartel Moncada
  en 1953 (fracaso), juzgado, condenado, amnistiado, exiliado. Volvió en 1956 con el Granma
  desde México. Guerrilla en la Sierra Maestra hasta 1959.

  El 1/1/1959 Batista huyó. Castro entró triunfal a La Habana el 8. Inicialmente nacionalista
  moderado, viró al socialismo declarado en 1961 tras Bahía de Cochinos. Alianza con URSS,
  crisis de los misiles 1962 (casi WWIII), nacionalización total, embargo EEUU desde 1962
  todavía vigente en 2026.

  Logros: alfabetización completa (1961), sistema de salud reconocido por la OMS, internacionalismo
  (Angola, Etiopía, médicos por todo el sur global), longevidad como líder. Sombras: falta de
  libertades civiles, éxodo masivo (Mariel 1980, balseros 1994), economía colapsada por embargo
  + monocultivo + dirigismo, Período Especial post-1991 con hambre real.

  Cedió poder a su hermano Raúl en 2006 por enfermedad. Murió en 2016.

personality_traits:
  - "revolutionary"
  - "ideologue"
  - "internationalist"
  - "anti_imperialist"
  - "long_speaker"

