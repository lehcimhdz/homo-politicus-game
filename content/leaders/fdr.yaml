id: fdr
version: 1
name_es: "Franklin Delano Roosevelt"
name_en: "Franklin Delano Roosevelt"
country_origin: "United States"
years_active: "1933-1945"

bio_short_es: |
  Cuatro veces presidente de EEUU (récord absoluto). Aplicó el New Deal contra la Gran Depresión,
  llevó a EEUU a la 2GM, diseñó la ONU. Discapacitado por polio, lo ocultó al público.

bio_short_en: |
  Four-term US President (absolute record). Applied the New Deal against the Great Depression,
  led US into WWII, designed the UN. Disabled by polio, hid it from public.

bio_long_es: |
  Hijo de élite neoyorkina, primo lejano de Theodore Roosevelt. Asambleísta, subsecretario de
  Marina, candidato a vicepresidente derrotado 1920. Atacado por polio 1921, perdió uso de
  piernas. Volvió a la política como gobernador de NY 1929-32.

  Ganó la presidencia en 1932 contra Hoover (catastróficamente impopular por la Depresión).
  El New Deal (1933-39) reformó capitalismo americano: Securities Act, Glass-Steagall, Social
  Security, Wagner Act (sindicatos), CCC, WPA, TVA. Polémico: la Corte Suprema lo bloqueó
  inicialmente; FDR intentó court-packing 1937 (fracasó políticamente).

  2GM: declaración tras Pearl Harbor (1941). Alianza con Churchill y Stalin. Diseñó Bretton Woods
  y la ONU antes de morir en abril 1945, tres semanas antes de la rendición alemana.

personality_traits:
  - "pragmatist"
  - "progressive"
  - "great_communicator"  # Fireside chats
  - "interventionist"
  - "war_leader"

