id: lee_kuan_yew
version: 1
name_es: "Lee Kuan Yew"
name_en: "Lee Kuan Yew"
country_origin: "Singapore"
years_active: "1959-1990 (PM), 1990-2015 (Senior Minister/Mentor)"

bio_short_es: |
  Padre fundador de Singapur. Llevó al país de tercer mundo a primer mundo en una generación.
  Autoritarismo benévolo, anti-corrupción brutal, meritocracia étnica, planificación tecnocrática.

bio_short_en: |
  Founding father of Singapore. Took the country from third to first world in one generation.
  Benevolent authoritarianism, brutal anti-corruption, ethnic meritocracy, technocratic planning.

bio_long_es: |
  Abogado formado en Cambridge, líder del People's Action Party (PAP). PM desde 1959 (entonces
  Singapur era estado de Malasia). Tras la expulsión de la federación en 1965, lideró la
  construcción del estado-nación moderno.

  Su modelo: estado fuerte con un solo partido dominante (PAP), tecnócratas en gabinete con
  salarios privados (Singapur paga a sus ministros ~$2M anuales para evitar corrupción), aparato
  legal severo (azotes, pena de muerte por drogas), pero infraestructura, vivienda pública (HDB),
  educación y salud world-class. Cero ideología económica fija: tomó lo que funcionó.

  Política étnica: cuotas en HDB para evitar guetos raciales, bilingüismo obligatorio (inglés +
  lengua materna), libros religiosos estrictamente regulados para prevenir conflicto.

  Crítica: democracia formal pero competitiva real limitada, prensa autocensurada, oposición
  perseguida por libelo (caso JB Jeyaretnam). Heredó el poder a su hijo Lee Hsien Loong.

