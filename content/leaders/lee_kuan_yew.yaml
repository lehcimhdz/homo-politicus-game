trivia_es: |
  - Acuñó "Asian values" debate en los 90.
  - Singapur 1965: $516 per cápita. 2015: $55.000 (su muerte).
  - Forbes lo llamó "father of modern Singapore".
  - Su escritura "From Third World to First" es bestseller global.
