trivia_es: |
  - Política nuclear: cerró todas las centrales tras Fukushima.
  - Fue traída a la política por Helmut Kohl en 1991.
  - Habla ruso fluido (residencia académica en Moscú).
  - Su esposo Joachim Sauer es químico cuántico, casi nunca aparece en público.
  - Récord de aprobación post-jubilación: ~70%.
