id: merkel
version: 1
name_es: "Angela Merkel"
name_en: "Angela Merkel"
country_origin: "Germany"
years_active: "2005-2021"

bio_short_es: |
  Física, criada en la RDA. Primera mujer canciller de Alemania, 16 años en el poder.
  Pragmática centro-derecha, manejó la crisis del euro, refugiados (2015), Covid.

bio_short_en: |
  Physicist, raised in East Germany. Germany's first female chancellor, 16 years in power.
  Centrist-right pragmatist, managed the euro crisis, refugees (2015), Covid.

bio_long_es: |
  Doctora en química cuántica, hija de pastor luterano. Creció en la RDA, joven militante de
  la FDJ comunista (sin convicción visible). Tras la caída del Muro, entró en la nueva CDU del
  Este, fue mentoreada por Helmut Kohl.

  Ministra de Mujer (1991), ministra de Medio Ambiente (1994), líder de CDU desde 2000.
  Canciller desde 2005, ganó 4 elecciones consecutivas. Característica: anti-dramatismo,
  decisiones lentas y técnicas, capacidad de absorber crisis sin perder estabilidad.

  Hitos: crisis del euro 2010-12 (austeridad para Grecia, ahorrar el euro), Fukushima
  2011 (cierre nuclear acelerado), crisis migratoria 2015 ("Wir schaffen das"), Brexit 2016,
  pandemia 2020. Mantuvo siempre ~60% aprobación, raro en política europea.

  Críticas: dependencia energética rusa (Nord Stream), austeridad excesiva con Grecia,
  digitalización lenta, conformismo. Se retiró voluntariamente en 2021.

