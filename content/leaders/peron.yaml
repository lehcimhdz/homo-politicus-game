trivia_es: |
  - Tres veces presidente, dos golpes en su contra (1955, no llegó a 1976).
  - Inspiró a Vargas (Brasil), Velasco Alvarado (Perú) y Chávez (Venezuela).
  - El "movimiento peronista" gobierna Argentina más años que cualquier otro desde 1945.
  - Eva Perón rechazó la vicepresidencia en 1951 (Cabildo Abierto del Renunciamiento).
