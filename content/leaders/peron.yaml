id: peron
version: 1
name_es: "Juan Domingo Perón"
name_en: "Juan Domingo Perón"
country_origin: "Argentina"
years_active: "1946-1955, 1973-1974"

bio_short_es: |
  Militar nacionalista, fundador del peronismo. Construyó el sindicalismo más poderoso de
  Latinoamérica, otorgó derechos laborales y voto femenino, polarizó al país para siempre.

bio_short_en: |
  Nationalist military, founder of Peronism. Built Latin America's most powerful trade unionism,
  granted labor rights and female suffrage, polarized the country forever.

bio_long_es: |
  Coronel del ejército que llegó al poder en 1946 surfeando el descontento obrero y la crisis
  política. Su movimiento (justicialismo) fusionó nacionalismo, doctrina social cristiana,
  fascismo italiano admirado en sus años de agregado militar en Roma, y sindicalismo militante.

  Repartió derechos masivos (vacaciones pagas, aguinaldo, jubilaciones) financiados por las
  reservas dejadas por la 2GM. Cuando se acabaron, viró hacia el nacionalismo económico y la
  estatización. Su segunda esposa, Eva Duarte, se volvió ícono mítico tras su muerte en 1952.

  Polarizó al país en términos casi religiosos: peronismo vs antiperonismo. Derrocado en 1955
  por un golpe cívico-militar, exiliado 18 años. Volvió en 1973 a un país irreconocible y murió
  un año después dejando a Isabelita y López Rega en el poder, antesala del caos de 1976.

