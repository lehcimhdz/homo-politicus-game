id: mandela
version: 1
name_es: "Nelson Mandela"
name_en: "Nelson Mandela"
country_origin: "South Africa"
years_active: "1994-1999"

bio_short_es: |
  Líder anti-apartheid encarcelado 27 años, primer presidente negro de Sudáfrica electo
  democráticamente. Símbolo mundial de reconciliación. Heredó un país al borde de la guerra civil racial.

bio_short_en: |
  Anti-apartheid leader imprisoned 27 years, first democratically elected black President of South Africa.
  Global symbol of reconciliation. Inherited a country on the brink of racial civil war.

bio_long_es: |
  Abogado xhosa de la familia real Thembu. Fundador del ala militar (uMkhonto we Sizwe) del ANC.
  Condenado a cadena perpetua en 1964 en el juicio de Rivonia; pasó 27 años en Robben Island y
  otras prisiones. Liberado en 1990 por F.W. de Klerk en un proceso negociado.

  Asumió la presidencia en 1994 tras las primeras elecciones multirraciales. Su principal logro
  fue evitar la guerra civil: priorizó reconciliación sobre venganza (Comisión de la Verdad y la
  Reconciliación, dirigida por Desmond Tutu). La copa Rugby 1995 (Sudáfrica campeón con Mandela
  vistiendo la camiseta Springbok) se volvió ícono.

  Limitaciones: pobreza estructural y desigualdad racial no fueron desmanteladas (la economía
  siguió en manos blancas), HIV/AIDS gestionada deficientemente, criminalidad alta. Pero la
  transición pacífica fue un milagro político.

