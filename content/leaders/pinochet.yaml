trivia_es: |
  - Sobrevivió atentado del FPMR en 1986 (Operación Siglo XX).
  - Su esposa Lucía Hiriart tenía cuenta en Riggs Bank con $15M no declarados.
  - Detenido en clínica de Londres en 1998 mientras se operaba la columna.
  - El "estallido social" chileno de octubre 2019 atribuido a deuda histórica con su modelo.
