id: pinochet
version: 1
name_es: "Augusto Pinochet"
name_en: "Augusto Pinochet"
country_origin: "Chile"
years_active: "1973-1990"

bio_short_es: |
  General que lideró el golpe contra Allende. Dictador 17 años. Aplicó shock económico neoliberal
  (Chicago Boys) con represión brutal: 3.197 desaparecidos confirmados, 40.000 torturados.

bio_short_en: |
  General who led the coup against Allende. Dictator for 17 years. Applied neoliberal shock therapy
  (Chicago Boys) with brutal repression: 3,197 confirmed disappeared, 40,000 tortured.

bio_long_es: |
  Oficial nacido en Valparaíso, hijo de aduanero. Ascendió a Comandante en Jefe en agosto de 1973
  con el voto de Allende, que confiaba en su lealtad constitucional. Lideró el golpe del 11/9.

  Se autoproclamó Jefe del Estado, disolvió Congreso, prohibió partidos, instauró toque de queda
  por años. La DINA (luego CNI) ejecutó la represión sistemática (caravanas de la muerte, Operación
  Cóndor). Plan económico: privatizaciones masivas, apertura comercial total, reformas tributarias
  pro-capital, sistema de AFP (jubilaciones privadas), Constitución 1980 hecha a su medida.

  Resultado económico: "milagro" macro con desigualdad histórica. Plebiscito 1988 (NO ganó),
  transición 1990. Mantuvo comandancia del ejército hasta 1998. Detenido en Londres 1998 por
  el juez Garzón (caso de jurisdicción universal). Murió en 2006 sin condena por DD.HH., con
  causas pendientes por enriquecimiento ilícito (cuentas en Riggs Bank).

