id: hitler
version: 1
name_es: "Adolf Hitler"
name_en: "Adolf Hitler"
country_origin: "Germany"
years_active: "1933-1945"

bio_short_es: |
  Líder del partido nazi, canciller (1933-45) y Führer (1934-45). Responsable del Holocausto
  (6 millones de judíos asesinados) y de la 2GM (50+ millones de muertos). Caso de estudio del
  fracaso del centro liberal frente al fascismo.

bio_short_en: |
  Nazi party leader, chancellor (1933-45) and Führer (1934-45). Responsible for the Holocaust
  (6 million Jews murdered) and WWII (50+ million dead). Case study of liberal centrism's failure
  vs fascism.

bio_long_es: |
  Austríaco, fracasado pintor, veterano 1GM, militante en partido marginal nacionalista. Intentó
  el Putsch de Múnich 1923 (fracaso), preso, escribió Mein Kampf. NSDAP creció con la Depresión:
  de 2.6% en 1928 a 37% en julio 1932 (mayor partido).

  Hindenburg lo designó canciller 30/1/1933. En seis meses: incendio Reichstag (febrero), Ley
  Habilitante (marzo), disolución sindicatos (mayo), partido único (julio), control absoluto.
  Tras muerte de Hindenburg (1934), fusionó cargos: Führer. Persecución progresiva: leyes de
  Núremberg (1935), Kristallnacht (1938), invasión de Polonia (1939) → 2GM. Solución Final desde
  1942: campos de exterminio sistemáticos.

  Suicidio 30/4/1945 en bunker de Berlín, dos días antes de la rendición.

  **Nota del juego:** este líder está disponible exclusivamente como **antagonista** en el
  escenario "Alemania 1933 — La encrucijada". No es jugable como héroe.

