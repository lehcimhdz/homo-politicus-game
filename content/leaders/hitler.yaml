historical_starting_year: 1933

trivia_es: |
  - Mein Kampf fue bestseller (1925-45), recargado en Alemania post-1945.
  - Operación Valkiria (1944): intento de asesinato por oficiales alemanes, fracasó.
  - Su perro Blondi murió en el bunker minutos antes que él.
  - Anti-tabaco: prohibió fumar en muchos espacios públicos (paradójicamente progresista).

content_warning: |
  Este líder modela una de las figuras más estudiadas del fascismo histórico. El juego no
  permite jugar como Hitler de manera "heroica"; solo aparece como antagonista en escenarios
  educativos. Los efectos modelados (Holocausto, 2GM) están documentados, no glorificados.
