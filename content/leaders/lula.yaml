id: lula
version: 1
name_es: "Luiz Inácio Lula da Silva"
name_en: "Luiz Inácio Lula da Silva"
country_origin: "Brazil"
years_active: "2003-2010, 2023-presente"

bio_short_es: |
  Sindicalista metalúrgico, fundador del PT. Tres presidencias (2003-2006, 2007-2010, 2023-).
  Sacó 30 millones de la pobreza con Bolsa Família, encarcelado 580 días, regresó al poder.

bio_short_en: |
  Metalworker union leader, founder of PT. Three presidencies (2003-2006, 2007-2010, 2023-).
  Lifted 30 million out of poverty with Bolsa Família, jailed 580 days, returned to power.

bio_long_es: |
  Nordestino migrante a São Paulo. Obrero metalúrgico de Volkswagen, perdió un dedo en accidente
  laboral. Lideró las huelgas del ABC paulista en 1979-80, contra la dictadura militar. Cofundó
  el PT (Partido dos Trabalhadores) en 1980 y la CUT (sindical) en 1983.

  Cuatro candidaturas presidenciales (1989, 1994, 1998, 2002): perdió tres, ganó la cuarta.
  Su gestión 2003-10: estabilidad macro heredada de FHC + masiva redistribución (Bolsa Família
  llegó a 50M de personas), salario mínimo +75% real, programa de inclusión universitaria,
  boom de commodities = milagro brasileño. Salió con 87% aprobación.

  Dilma sucesora, Lava Jato, encarcelamiento de Lula en 2018 (Sergio Moro como juez), elección
  de Bolsonaro. Lula salió en libertad por anulación de proceso (2021), regresó al poder en 2023
  derrotando a Bolsonaro.

