historical_starting_year: 2003

trivia_es: |
  - "Nunca antes nesse país" (frase fetiche).
  - Su Lula 2003 ganó con 61% en segunda vuelta.
  - Lula 2023 ganó con 50.9% (más apretada de la historia brasileña).
  - Su esposa Marisa Letícia murió en 2017.
  - Encarcelado en Curitiba, no podía ver fútbol del Corinthians (su pasión).
