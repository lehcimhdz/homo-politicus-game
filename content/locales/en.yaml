decisions:
  coup_threat:
    prompt: "High command threatens to seize power. Your response?"
    options:
      purge_military: "Purge the military"
      negotiate_military: "Negotiate with high command"
      cede_power: "Cede power"
      resist: "Resist defiantly"
  big_scandal:
    prompt: "Major scandal on front pages. How do you react?"
    options:
      cover_up: "Cover up"
      resign_minister: "Force minister to resign"
      deny: "Deny everything"
      accept_responsibility: "Accept responsibility"
  congress_crisis:
    prompt: "Congress threatens to remove you. What do you do?"
    options:
      call_referendum: "Call a referendum"
      dissolve_congress: "Dissolve congress"
      negotiate_coalition: "Negotiate coalition"
      resign: "Resign"
  neighbor_ultimatum:
    prompt: "Hostile neighbor issues territorial ultimatum. How do you respond?"
    options:
      cede_territory: "Cede territory"
      mobilize: "Military mobilization"
      seek_mediation: "Seek international mediation"
  nuclear_threat:
    prompt: "Imminent nuclear attack risk. Your decision?"
    options:
      preemptive_strike: "Preemptive strike"
      diplomatic_summit: "Diplomatic summit"
      evacuate_cities: "Evacuate cities"
