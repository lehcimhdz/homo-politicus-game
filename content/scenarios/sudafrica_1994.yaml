id: sudafrica_1994
version: 1
name_es: "Sudáfrica 1994 — Mandela asume"
name_en: "South Africa 1994 — Mandela takes office"
start_year: 1994
start_turn: 0
difficulty: "★★★★☆"

description_es: |
  Mayo de 1994. Nelson Mandela asume tras las primeras elecciones multirraciales. El apartheid ha
  terminado. Pero la economía sigue en manos blancas (el 13% de la población posee el 87% de los
  activos), la criminalidad estalla, el HIV/AIDS amenaza colapsar la salud pública, los blancos
  emigran o se atrincheran. Tenés que evitar la guerra civil racial Y reconstruir un país.

description_en: |
  May 1994. Nelson Mandela takes office after first multiracial elections. Apartheid is over. But
  the economy remains in white hands (13% of population owns 87% of assets), crime explodes,
  HIV/AIDS threatens to collapse public health, whites emigrate or barricade. You must prevent
  racial civil war AND rebuild a country.

narrative_intro_es: |
  Sos Mandela. 27 años preso. Premio Nobel. Símbolo mundial. Y ahora, presidente de un país
  partido. Tu prioridad: evitar la guerra civil que casi todos los analistas predicen. Tu desafío:
  redistribuir sin asustar al capital, integrar sin venganza, sanar 350 años de racismo.

  En la historia real elegiste la reconciliación (Comisión de la Verdad). Pero hay otras opciones:
  redistribución radical estilo Zimbabwe, modelo socialdemócrata escandinavo, o autoritarismo
  africano clásico.

