historical_notes_es: |
  - Mandela gobernó 1994-99 (un solo término por elección propia).
  - Comisión de la Verdad y Reconciliación (1996) lideró por Desmond Tutu.
  - HIV/AIDS mal gestionada por Mbeki tras Mandela (300.000+ muertes evitables).
  - Sudáfrica 2024: ANC en crisis tras 30 años de poder, desigualdad récord mundial.
