historical_notes_es: |
  - 2013-2019: hiperinflación llegó a 1.000.000% anual (mayor de la historia americana).
  - 7+ millones emigraron, mayor crisis migratoria de las Américas.
  - PIB cayó 75% acumulado (peor caída sin guerra en la historia económica).
  - Maduro sigue en el poder en 2026 (predicción 2024).
  - Reservas petroleras intactas pero infraestructura colapsada.

