id: venezuela_2013
version: 1
name_es: "Venezuela 2013 — La herencia chavista"
name_en: "Venezuela 2013 — The Chavista Inheritance"
start_year: 2013
start_turn: 0
difficulty: "★★★★★"

description_es: |
  Marzo de 2013. Hugo Chávez muere de cáncer tras 14 años en el poder. Su sucesor designado,
  Nicolás Maduro, asume con elecciones apretadas (1.5% de margen). El petróleo está a $100/barril
  pero la economía depende casi totalmente de él. Inflación 56% anual, controles cambiarios,
  desabastecimiento incipiente, polarización extrema, oposición liderada por Henrique Capriles.

description_en: |
  March 2013. Hugo Chávez dies of cancer after 14 years in power. His designated successor,
  Nicolás Maduro, takes over with a narrow election (1.5% margin). Oil is at $100/barrel but
  the economy depends almost entirely on it. 56% annual inflation, currency controls, incipient
  shortages, extreme polarization, opposition led by Henrique Capriles.

narrative_intro_es: |
  Heredás un país petrolero con polarización al rojo vivo. Tenés la maquinaria chavista
  todavía funcionando, pero sin el carisma del jefe. El precio del petróleo te sostiene...
  por ahora. Hay tres caminos:

  Mantener el modelo (controles + nacionalizaciones) y rezar que el petróleo no caiga.
  Liberalizar gradualmente para evitar el colapso (te tildarán de traidor).
  Doblar la apuesta autoritaria (cierre de oposición, militarización).

  El precio del petróleo va a caer. La pregunta es cuándo, y vos cuán preparado estés.

narrative_intro_en: |
  You inherit an oil-rich country with red-hot polarization. The Chavista machinery is still
  running, but without the chief's charisma. The oil price sustains you... for now. Three paths:

  Keep the model (controls + nationalizations) and pray oil doesn't fall.
  Gradually liberalize to avoid collapse (you'll be called a traitor).
  Double down on authoritarianism (close opposition, militarize).

  The oil price will fall. The question is when, and how prepared you are.

