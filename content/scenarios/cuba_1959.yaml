id: cuba_1959
version: 1
name_es: "Cuba 1959 — La revolución en el poder"
name_en: "Cuba 1959 — The Revolution in Power"
start_year: 1959
start_turn: 0
difficulty: "★★★★★"

description_es: |
  1 de enero de 1959. Batista huye. El Movimiento 26 de Julio entra triunfal a La Habana.
  La isla está en euforia popular pero con economía dominada por capitales estadounidenses,
  azúcar como monocultivo, mafia controlando casinos, y una sociedad profundamente desigual.
  La Guerra Fría está en su clímax.

description_en: |
  January 1, 1959. Batista flees. The 26th of July Movement triumphantly enters Havana.
  The island is in popular euphoria but with US-dominated economy, sugar monoculture,
  mob-controlled casinos, and a deeply unequal society. The Cold War is at its peak.

narrative_intro_es: |
  La revolución triunfó. Tenés popularidad estratosférica y un país que querés transformar.
  Pero EEUU vigila cada movimiento; cualquier nacionalización puede traerte invasión.
  La URSS te tienta con apoyo, a cambio de alinearte completamente en su bloque.

  ¿Vas hasta el fondo en la revolución (socialismo + alineación URSS)?
  ¿Mantenés una vía nacionalista intermedia (estilo PRI mexicano)?
  ¿O convertís Cuba en una socialdemocracia escandinava del Caribe?

narrative_intro_en: |
  The revolution triumphed. You have stratospheric popularity and a country to transform.
  But the US watches every move; any nationalization can bring invasion.
  The USSR tempts you with support, in exchange for full alignment with its bloc.

  Do you go all-in on revolution (socialism + USSR alignment)?
  Keep an intermediate nationalist path (Mexican PRI style)?
  Or turn Cuba into a Caribbean Scandinavian social-democracy?

