    description_es: "Sobrevive 12 turnos sin invasión exitosa"
    description_en: "Survive 12 turns without successful invasion"
  plata:
    description_es: "Mantén legitimidad >0.6 durante 24 turnos"
    description_en: "Keep legitimacy >0.6 for 24 turns"
  oro:
    description_es: "Alcanza salud >0.85 Y educación >0.85 (revolución completa)"
    description_en: "Reach health >0.85 AND education >0.85 (full revolution)"
  diamante:
    description_es: "Lográ todo lo anterior + economía abierta (trade_balance >0)"
    description_en: "Achieve all above + open economy (trade_balance >0)"

historical_notes_es: |
  - Cuba real: educación y salud excelentes, economía colapsada por bloqueo + monocultivo.
  - 1961: alfabetización completa en un año (campaña épica).
  - 1962: crisis de los misiles, casi WWIII.
  - 1991: colapso URSS → Período Especial: -35% PIB, hambre real.
  - 2008-2026: liberalizaciones graduales, emigración masiva.

sources:
  - "Tad Szulc, Fidel: A Critical Portrait (1986)"
  - "Hugh Thomas, Cuba: The Pursuit of Freedom (1971)"
  - "Richard Gott, Cuba: A New History (2004)"
