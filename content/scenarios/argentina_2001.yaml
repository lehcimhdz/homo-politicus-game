  Diciembre de 2001. Argentina al borde del colapso. De la Rúa restringe retiros bancarios
  (corralito) el 1 de diciembre. Cacerolazos masivos. "Que se vayan todos." El 20 de diciembre
  De la Rúa renuncia en helicóptero. 5 presidentes en 11 días. Default soberano por $93 mil
  millones — el mayor de la historia hasta ese momento. Convertibilidad muerta.

