id: argentina_1976
version: 1
name_es: "Argentina 1976 — La encrucijada"
name_en: "Argentina 1976 — The Crossroads"
start_year: 1976
start_turn: 0
difficulty: "★★★★★"

description_es: |
  Marzo de 1976. La presidenta Isabel Perón ha sido derrocada por una junta militar.
  El país se encuentra en una crisis económica devastadora con inflación del 444% anual,
  guerrilla activa (Montoneros, ERP) y polarización extrema. La sociedad está exhausta
  tras tres años de violencia política, terrorismo de izquierda y derecha, y el caos
  económico del Rodrigazo (1975).

description_en: |
  March 1976. President Isabel Perón has been overthrown by a military junta.
  The country faces devastating economic crisis with 444% annual inflation, active
  guerrillas (Montoneros, ERP) and extreme polarization. Society is exhausted after
  three years of political violence, left and right terrorism, and economic chaos.

narrative_intro_es: |
  Sos parte de la junta militar que acaba de tomar el poder. Tenés tres caminos:
  reprimir y consolidar el régimen (el camino histórico, con genocidio incluido),
  convocar a elecciones rápidas devolviendo el poder a un peronismo moderado,
  o intentar un proyecto militar reformista al estilo brasileño.

  Cada decisión te perseguirá durante 30 años. La memoria histórica argentina no perdona.

narrative_intro_en: |
  You are part of the military junta that just seized power. You have three paths:
  repress and consolidate the regime (the historical path, including genocide),
  call quick elections returning power to moderate Peronism,
  or attempt a Brazilian-style reformist military project.

  Every decision will haunt you for 30 years. Argentine historical memory does not forgive.

