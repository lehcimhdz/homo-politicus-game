objectives:
  bronce:
    description_es: "Sobrevive 12 turnos (3 años) sin perder el poder"
    description_en: "Survive 12 turns (3 years) without losing power"
    condition: "turn >= 12 AND end_condition == NONE"
  plata:
    description_es: "Termina con popularidad >40% y sin más de 1000 desaparecidos"
    description_en: "End with popularity >40% and fewer than 1000 disappearances"
    condition: "popularity >= 0.4 AND forced_disappearances_total < 1000"
  oro:
    description_es: "Convocá elecciones libres antes del turno 24 y entregá el poder pacíficamente"
    description_en: "Call free elections before turn 24 and transfer power peacefully"
    condition: "elections_called BEFORE turn 24 AND end_condition == TERM_COMPLETED"
  diamante:
    description_es: "Lográ un milagro económico (inflación <20%, crecimiento >3%) sin desaparecidos"
    description_en: "Achieve economic miracle (inflation <20%, growth >3%) without disappearances"
    condition: "inflation < 0.20 AND growth_rate > 0.03 AND forced_disappearances_total == 0"

historical_notes_es: |
  - La junta militar real (1976-1983) dejó ~30.000 desaparecidos, hiperinflación
    final del 433% mensual (1989), default soberano, derrota en Malvinas, y un
    impacto traumático en la memoria social todavía vigente.
  - Martínez de Hoz aplicó apertura y financierización que destruyó la industria.
  - El Mundial 78 fue usado como cortina propagandística.
  - El régimen colapsó tras la derrota de Malvinas; Alfonsín ganó en 1983.

sources:
  - "Nunca Más (CONADEP, 1984)"
  - "Robert Cox, Dirty Secrets, Dirty War (2008)"
  - "Marcos Novaro & Vicente Palermo, La dictadura militar 1976-1983 (2003)"
