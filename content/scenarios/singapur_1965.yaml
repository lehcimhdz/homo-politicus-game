id: singapur_1965
version: 1
name_es: "Singapur 1965 — Independencia forzada"
name_en: "Singapore 1965 — Forced Independence"
start_year: 1965
start_turn: 0
difficulty: "★★★★☆"

description_es: |
  9 de agosto de 1965. Singapur es expulsado de la Federación Malaya. Sos Lee Kuan Yew,
  un líder visiblemente angustiado en cámara: heredás una ciudad-estado sin recursos naturales,
  sin agua potable propia, con 1.9 millones de habitantes (75% chinos, 15% malayos, 10% indios),
  rodeada de vecinos hostiles (Indonesia bajo Sukarno), pobreza endémica, tensión racial,
  y un PIB per cápita de $516. Tenés 600 km² para convertir en un país.

description_en: |
  August 9, 1965. Singapore is expelled from the Malay Federation. You are Lee Kuan Yew,
  a visibly anguished leader on camera: you inherit a city-state without natural resources,
  without its own potable water, 1.9 million inhabitants (75% Chinese, 15% Malay, 10% Indian),
  surrounded by hostile neighbors (Indonesia under Sukarno), endemic poverty, racial tension,
  and a per-capita GDP of $516. You have 600 km² to turn into a country.

narrative_intro_es: |
  Tenés meses, no años, para sobrevivir como país. Sin recursos, dependés de los servicios:
  puerto, finanzas, manufactura ligera. Tres ejes para decidir:

  - Estilo de gobernanza: autoritarismo benevolente (el camino histórico) o democracia plena.
  - Modelo económico: capitalismo estatal con tecnócratas, o mercado libre puro.
  - Política étnica: meritocracia ciega al color, o cuotas para evitar conflicto racial.

  En 60 años, Singapur pasó de $516 a $90.000 PIB per cápita. ¿Podés replicarlo?

narrative_intro_en: |
  You have months, not years, to survive as a country. Without resources, you depend on services:
  port, finance, light manufacturing. Three axes to decide:

  - Governance style: benevolent authoritarianism (historical path) or full democracy.
  - Economic model: state capitalism with technocrats, or pure free market.
  - Ethnic policy: color-blind meritocracy, or quotas to avoid racial conflict.

  In 60 years Singapore went from $516 to $90,000 GDP per capita. Can you replicate it?

