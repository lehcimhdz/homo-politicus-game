historical_notes_es: |
  - Lee Kuan Yew gobernó 1959-1990. PAP gobierna sin interrupción hasta 2026.
  - 1965: $516 PIB per cápita. 2024: $90.000 (uno de los más altos del mundo).
  - Política étnica con cuotas en viviendas evitó segregación.
  - Anti-corrupción brutal: CPIB con poder de arresto sin orden judicial.
  - Castigos corporales legales (azotes con caña). Pena de muerte por drogas.
  - Singapur en 2026 es el único caso documentado de "salto del Tercer al Primer Mundo".

sources:
  - "Lee Kuan Yew, From Third World to First (2000)"
  - "Cherian George, Singapore: The Air-Conditioned Nation (2000)"
  - "Mauzy & Milne, Singapore Politics under the PAP (2002)"
