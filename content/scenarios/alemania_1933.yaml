historical_notes_es: |
  - 30 enero 1933: Hindenburg designa a Hitler canciller. Mes y medio después: incendio Reichstag,
    Ley Habilitante, fin de Weimar.
  - Lección histórica: el "vamos a contenerlo desde adentro" (estrategia von Papen) falló.
  - Si querés cambiar la historia, tenés que coordinar centro y centroizquierda antes del turno 4.
