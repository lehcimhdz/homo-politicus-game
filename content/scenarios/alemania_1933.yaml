id: alemania_1933
version: 1
name_es: "Alemania 1933 — La encrucijada"
name_en: "Germany 1933 — The Crossroads"
start_year: 1933
start_turn: 0
difficulty: "★★★★★"

description_es: |
  Enero de 1933. La República de Weimar agoniza tras 14 años de crisis económica, inflación, deuda
  de Versalles, calles tomadas por SA y comunistas, y un sistema parlamentario fragmentado en 30+
  partidos. Hindenburg está por designar canciller. Tu rol: el político moderado que puede frenar el
  ascenso del nazismo, o el que se rinde a la "solución del hombre fuerte".

description_en: |
  January 1933. Weimar Republic agonizes after 14 years of economic crisis, inflation, Versailles
  debt, streets taken by SA and communists, and parliamentary system fragmented into 30+ parties.
  Hindenburg is about to appoint chancellor. Your role: the moderate politician who can stop the
  rise of Nazism, or the one who surrenders to the "strongman solution".

narrative_intro_es: |
  Sos Hindenburg, presidente octogenario. Tenés que designar canciller. Las opciones reales:
  Hitler (NSDAP, 33% de los votos), Schleicher (militar pragmático), o un gabinete técnico de
  coalición moderada. Cada decisión cierra puertas. Es uno de los momentos más estudiados de la
  historia política: el del fallo del centro liberal frente al fascismo.

  Si el centro logra coordinarse, evitás Auschwitz. Si fragmentás, le abrís la puerta.

