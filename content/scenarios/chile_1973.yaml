id: chile_1973
version: 1
name_es: "Chile 1973 — El último año de Allende"
name_en: "Chile 1973 — Allende's Last Year"
start_year: 1973
start_turn: 0
difficulty: "★★★★★"

description_es: |
  Enero de 1973. Salvador Allende lleva dos años en La Moneda con la Unidad Popular.
  Nacionalización del cobre exitosa, reforma agraria avanzada, pero inflación de 600% anual,
  desabastecimiento por sabotaje empresarial (Patria y Libertad, paro camionero), CIA financiando
  oposición, ITT conspirando, y un Pinochet recién ascendido. El Congreso opositor lo bloquea todo.

description_en: |
  January 1973. Salvador Allende has been in La Moneda for two years with the Popular Unity.
  Successful copper nationalization, advanced land reform, but 600% annual inflation,
  shortages from business sabotage (Patria y Libertad, truck strike), CIA-funded opposition,
  ITT conspiring, and a newly promoted Pinochet. Opposition Congress blocks everything.

narrative_intro_es: |
  Sos Allende. Tenés un programa revolucionario por vía pacífica, pero el cerco se cierra.
  Las clases medias odian la inflación y las colas. El ejército está infiltrado. El Congreso
  bloquea cada ley. Nixon y Kissinger juraron "hacer chillar la economía".

  Tres caminos:
  - Profundizar la revolución, armar al pueblo, romper con la legalidad burguesa.
  - Negociar con la DC y moderar el programa para sobrevivir.
  - Llamar a plebiscito antes de que sea tarde.

  En la historia real elegiste el tercer camino pero no llegaste a anunciarlo.

narrative_intro_en: |
  You are Allende. You have a peaceful-path revolutionary program, but the noose tightens.
  The middle classes hate inflation and shortages. The army is infiltrated. Congress blocks
  every law. Nixon and Kissinger swore to "make the economy scream".

  Three paths:
  - Deepen the revolution, arm the people, break with bourgeois legality.
  - Negotiate with Christian Democracy and moderate the program to survive.
  - Call for plebiscite before it's too late.

  In real history you chose the third but didn't make it to announce it.

