historical_notes_es: |
  - 11/9/1973: bombardeo de La Moneda, Allende se suicida (o lo asesinan).
  - Pinochet gobierna hasta 1990. 3.197 desaparecidos confirmados.
  - Plan económico de los Chicago Boys → milagro/desigualdad chilena.
  - Caso de manual de Doctrina de Seguridad Nacional.
  - Allende es ícono mundial de la vía democrática al socialismo.

