id: usa_1929
version: 1
name_es: "EEUU 1929 — Crack de Wall Street"
name_en: "USA 1929 — Wall Street Crash"
start_year: 1929
start_turn: 0
difficulty: "★★★★☆"

description_es: |
  Octubre de 1929. Wall Street se desploma. Herbert Hoover, presidente republicano electo hace meses,
  enfrenta la crisis económica más devastadora del capitalismo. La fe en el mercado libre se hace
  añicos; en cuatro años el desempleo llegará al 25% si no hacés nada. Tenés tres caminos posibles:
  ortodoxia liberal, intervencionismo tipo New Deal (todavía no inventado), o gobierno militar.

description_en: |
  October 1929. Wall Street crashes. Herbert Hoover, Republican president elected months ago, faces
  capitalism's most devastating economic crisis. Faith in free markets shatters; in four years
  unemployment will reach 25% if you do nothing. Three possible paths: liberal orthodoxy, New Deal-style
  interventionism (not yet invented), or military government.

narrative_intro_es: |
  El crack acaba de suceder. La banca tambalea, miles de empresas quiebran cada semana, las filas
  para la sopa se multiplican. Vos sos Hoover (o un líder ficticio si querés cambiar la historia).
  Tenés cuatro años hasta las próximas elecciones. ¿Aplicás la cartilla clásica (recortar gasto,
  proteger el patrón oro, esperar que el mercado se autoregule), inventás un programa intervencionista
  estilo Keynes, o vas más allá con un gobierno autoritario tipo el que asoma en Europa?

