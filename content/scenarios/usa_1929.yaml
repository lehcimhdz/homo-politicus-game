historical_notes_es: |
  - Hoover perdió contra FDR en 1932 con 57% en su contra (catástrofe electoral).
  - El New Deal real (1933-39) recuperó la economía pero con costo político alto.
  - La Reserva Federal hizo lo opuesto a lo correcto (contracción monetaria).
  - El Glass-Steagall Act separó banca comercial de inversión (1933-1999).
